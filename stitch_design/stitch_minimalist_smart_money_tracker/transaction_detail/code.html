        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #faf9fe;

    body {
      min-height: max(884px, 100dvh);
    }

<body class="flex flex-col min-h-screen text-on-surface">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-slate-50 flex items-center justify-between px-4 py-3 w-full z-10 border-none">
<div class="flex items-center gap-3">
<button class="material-symbols-outlined text-emerald-700 hover:opacity-80 transition-opacity active:scale-95 duration-150">arrow_back</button>
<h1 class="font-manrope text-sm font-semibold tracking-tight text-emerald-800">Transaction Details</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-emerald-700 hover:opacity-80 transition-opacity active:scale-95 duration-150">share</span>
<span class="material-symbols-outlined text-emerald-700 hover:opacity-80 transition-opacity active:scale-95 duration-150">more_vert</span>
</div>
</header>
<main class="flex-grow px-margin-screen pt-xl pb-32">
<!-- Amount Hero Section -->
<section class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-surface-container-highest rounded-full flex items-center justify-center mb-md shadow-sm overflow-hidden">
<img alt="Merchant Logo" class="w-full h-full object-cover" data-alt="A clean, minimalist high-key photograph of a modern organic cafe storefront with a wood and glass facade. The lighting is soft and bright, capturing a professional and trustworthy business atmosphere. The aesthetic is modern corporate, using a palette of soft whites and natural textures to evoke a sense of quiet confidence and reliability." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBU-xMvKZDqlWdzOVPRn6enCjPDjJOlEJWx-3EAv8M-HJKHIt-IXPRywu82Xekqfkb88onXkpw5dqnfaPffXwVoQD4jkaiihgzzi_HUdibmzYjn54zMBeK3aiBt0cP49739oVApoYdZbj05ioC1qhsRqcqpIISi6Ptg61sDOQykdlj19yo8wlVZWMkNRCsKCDlxquBwrum2X5zZn8OUwljt6W59NVDcaoL4F_KAy5KshfUCtgIeK9-08Y4PzQndhPEE6iHaUDNqZLw"/>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Blue Bottle Coffee</h2>
<div class="font-display-financial text-display-financial text-primary mb-xs">-$12.45</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Tuesday, Oct 24 • 08:32 AM</p>
</section>
<!-- Details Card -->
<div class="bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.04)] space-y-lg">
<!-- Category Dropdown -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-outline uppercase">Category</label>
<div class="relative group">
<div class="flex items-center gap-md border border-outline-variant rounded-xl px-md py-sm bg-surface-bright group-focus-within:border-primary group-focus-within:border-2 transition-all cursor-pointer">
<span class="material-symbols-outlined text-primary">local_cafe</span>
<span class="flex-grow font-body-lg text-body-lg">Food &amp; Drink</span>
<span class="material-symbols-outlined text-outline">expand_more</span>
</div>
</div>
</div>
<!-- Notes Input -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-outline uppercase">Notes</label>
<textarea class="w-full border border-outline-variant rounded-xl px-md py-sm bg-surface-bright font-body-lg text-body-lg focus:ring-0 focus:border-primary focus:border-2 min-h-[100px] resize-none outline-none" placeholder="Add a description..."></textarea>
</div>
<!-- Transaction Metadata -->
<div class="pt-md border-t border-surface-container-high space-y-md">
<div class="flex justify-between items-center">
<span class="font-body-sm text-body-sm text-on-surface-variant">Payment Method</span>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-sm text-on-surface">credit_card</span>
<span class="font-body-sm text-body-sm text-on-surface font-semibold">Visa •••• 4242</span>
</div>
</div>
<div class="flex justify-between items-center">
<span class="font-body-sm text-body-sm text-on-surface-variant">Location</span>
<span class="font-body-sm text-body-sm text-on-surface">San Francisco, CA</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-sm text-body-sm text-on-surface-variant">Status</span>
<div class="flex items-center gap-xs px-sm py-base bg-secondary-container text-on-secondary-container rounded-full">
<div class="w-1.5 h-1.5 rounded-full bg-on-secondary-container"></div>
<span class="text-[10px] font-bold uppercase tracking-wider">Completed</span>
</div>
</div>
</div>
</div>
<!-- Receipt Section -->
<div class="mt-lg">
<h3 class="font-label-caps text-label-caps text-outline uppercase mb-md">Receipt</h3>
<div class="aspect-video w-full rounded-xl border-2 border-dashed border-outline-variant bg-surface-container flex flex-col items-center justify-center gap-sm cursor-pointer hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-3xl text-outline">add_a_photo</span>
<span class="font-body-sm text-body-sm text-on-surface-variant font-medium">Attach Receipt Photo</span>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full p-md bg-background/80 backdrop-blur-md">
<button class="w-full bg-primary text-on-primary font-manrope font-semibold py-md rounded-xl shadow-[0_8px_20px_rgba(0,106,52,0.2)] active:scale-95 transition-transform">
            Save Changes
        </button>
</div>
<!-- Navigation Shell Suppressed for Detail View Per Rules -->
