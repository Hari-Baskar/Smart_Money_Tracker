<!-- Top AppBar (Simplified for Onboarding) -->
<header class="w-full max-w-md fixed top-0 left-0 right-0 mx-auto bg-transparent flex items-center justify-between px-md py-lg z-50">
<div class="flex items-center gap-base">
<div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">

</div>
<button class="font-body-sm font-semibold text-primary px-sm py-xs hover:opacity-80 active:scale-95 transition-all">Skip</button>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md flex flex-col items-center flex-grow pt-xl">
<!-- Illustration Section (Bento-style Cards Arrangement) -->
<section class="relative w-full aspect-square flex items-center justify-center mb-xl">
<!-- Background Decorative Shape -->
<div class="absolute inset-0 bg-secondary-container/20 rounded-full blur-3xl -z-10"></div>
<!-- Central Visual Metaphor: Floating Transaction Cards -->
<div class="relative w-full h-full">
<!-- Main "Automation" Hub -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-white rounded-full flex flex-col items-center justify-center quiet-shadow z-20">
<div class="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="auto_mode">auto_mode</span>
</div>
<span class="font-label-caps text-on-surface-variant uppercase tracking-widest">Automatic</span>
</div>
<!-- Floating Card 1: Grocery -->
<div class="absolute top-[10%] right-[5%] w-40 p-sm bg-white rounded-xl quiet-shadow flex items-center gap-sm glass-morphism z-30">
<div class="w-10 h-10 bg-tertiary-fixed rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" data-icon="shopping_cart">shopping_cart</span>
</div>
<div class="flex flex-col">
<span class="font-body-sm font-bold">$64.20</span>
<span class="text-[10px] text-on-surface-variant">Market Fresh</span>
</div>
<div class="ml-auto">
<span class="material-symbols-outlined text-primary text-sm" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Floating Card 2: Subscription -->
<div class="absolute bottom-[20%] left-[0%] w-44 p-sm bg-white rounded-xl quiet-shadow flex items-center gap-sm glass-morphism z-30">
<div class="w-10 h-10 bg-primary-fixed rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="subscriptions">subscriptions</span>
</div>
<div class="flex flex-col">
<span class="font-body-sm font-bold">$12.99</span>
<span class="text-[10px] text-on-surface-variant">Streamify App</span>
</div>
<div class="ml-auto">
<span class="material-symbols-outlined text-primary text-sm" data-icon="bolt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
</div>
<!-- Floating Card 3: Dining -->
<div class="absolute top-[25%] left-[5%] w-36 p-sm bg-white rounded-xl quiet-shadow flex items-center gap-sm glass-morphism z-10">
<div class="w-8 h-8 bg-surface-container-high rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-[18px]" data-icon="restaurant">restaurant</span>
</div>
<div class="flex flex-col">
<span class="font-body-sm font-bold">$24.50</span>
</div>
</div>

                Track expenses <span class="text-primary">automatically</span>
</h1>
<p class="font-body-lg text-on-surface-variant px-sm">
                Connect your accounts and let Smart Money handle the boring parts. No manual entry, no missed receipts.
            </p>
</section>

</div>

<button class="w-full bg-primary text-on-primary font-headline-md py-md rounded-xl quiet-shadow hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-sm">
                Get Started

</button>
